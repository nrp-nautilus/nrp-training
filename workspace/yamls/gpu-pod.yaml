# Simple GPU pod: requests one NVIDIA GPU and runs nvidia-smi.
# Use for Part 2 GPU provisioning. Replace <username> in name if you need a unique pod name.
apiVersion: v1
kind: Pod
metadata:
  name: tutorial-<username>-gpu-pod
  namespace: nrp-training-k8s
spec:
  tolerations:
  - key: nautilus.io/reservation
    operator: Equal
    value: nrp
    effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nrp-training
            operator: In
            values: ["true"]
  containers:
  - name: gpu-test
    image: nvidia/cuda:12.0.0-base-ubuntu22.04
    command: ["nvidia-smi"]
    args: ["--loop=60"]
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 4Gi
        cpu: "2"
      requests:
        nvidia.com/gpu: 1
        memory: 4Gi
        cpu: "2"
  restartPolicy: Never